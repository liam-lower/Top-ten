<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Tier Ranking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --bg-main: #0b1020;
        --bg-panel: #14192b;
        --bg-card: #1f2640;
        --border-panel: #30395c;
        --text-main: #f5f7ff;

        --tier-S: #ff4d6a;
        --tier-A: #ff9f43;
        --tier-B: #ffd93b;
        --tier-C: #4cd964;
        --tier-D: #4da6ff;
        --tier-F: #b84dff;

        --accent: #48c6ef;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #1b2340 0, #050814 55%, #000000 100%);
        color: var(--text-main);
        display: flex;
        min-height: 100vh;
    }

    .sidebar {
        width: 260px;
        background: var(--bg-panel);
        border-right: 2px solid var(--border-panel);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .sidebar-header h1 {
        margin: 0;
        font-size: 20px;
        text-align: center;
    }

    .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
    }

    .btn {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--accent);
        background: #1b2945;
        color: var(--accent);
        cursor: pointer;
        font-size: 12px;
    }

    .search-box input {
        width: 100%;
        padding: 6px;
        border-radius: 999px;
        border: 1px solid #3b456b;
        background: #101528;
        color: var(--text-main);
    }

    .game-list {
        flex: 1;
        overflow-y: auto;
    }

    .game-card {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        margin-bottom: 8px;
        background: var(--bg-card);
        border-radius: 10px;
        cursor: grab;
        border: 1px solid #2c3558;
        transition: 0.15s;
    }

    .game-card.dragging {
        opacity: 0.6;
        transform: scale(0.97);
    }

    .game-thumb {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: #222;
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .game-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .game-title {
        font-size: 13px;
        font-weight: 500;
    }

    .tiers-wrapper {
        flex: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .tier-row {
        display: flex;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-panel);
        background: rgba(10, 14, 30, 0.9);
        min-height: 80px;
    }

    .tier-label {
        width: 72px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        font-weight: 800;
        font-size: 24px;
        color: #050814;
        text-align: center;
    }

    .tier-label.S { background: var(--tier-S); }
    .tier-label.A { background: var(--tier-A); }
    .tier-label.B { background: var(--tier-B); }
    .tier-label.C { background: var(--tier-C); }
    .tier-label.D { background: var(--tier-D); }
    .tier-label.F { background: var(--tier-F); }

    .tier-content {
        flex: 1;
        padding: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .tier-content.drag-over {
        background: rgba(72,198,239,0.12);
        box-shadow: inset 0 0 0 1px var(--accent);
    }

    @media (max-width: 900px) {
        body { flex-direction: column; }
        .sidebar { width: 100%; max-height: 260px; border-right: none; border-bottom: 2px solid var(--border-panel); }
        .tier-row { flex-direction: column; }
        .tier-label { width: 100%; flex-direction: row; justify-content: center; }
    }
</style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h1>Popular Games</h1>
        <div class="controls">
            <button class="btn" id="saveBtn">Save</button>
            <button class="btn" id="loadBtn">Load</button>
            <button class="btn" id="resetBtn">Reset</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search games…">
        </div>
    </div>
    <div class="game-list" id="gameList"></div>
</aside>

<main class="tiers-wrapper">
    <div class="tier-row">
        <div class="tier-label S">S</div>
        <div class="tier-content" data-rank="S"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label A">A</div>
        <div class="tier-content" data-rank="A"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label B">B</div>
        <div class="tier-content" data-rank="B"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label C">C</div>
        <div class="tier-content" data-rank="C"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label D">D</div>
        <div class="tier-content" data-rank="D"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label F">F</div>
        <div class="tier-content" data-rank="F"></div>
    </div>
</main>
