<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Tier Ranking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --bg-main: #0b1020;
        --bg-panel: #14192b;
        --bg-card: #1f2640;
        --border-panel: #30395c;
        --text-main: #f5f7ff;

        --tier-S: #ff4d6a;
        --tier-A: #ff9f43;
        --tier-B: #ffd93b;
        --tier-C: #4cd964;
        --tier-D: #4da6ff;
        --tier-F: #b84dff;

        --accent: #48c6ef;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #1b2340 0, #050814 55%, #000000 100%);
        color: var(--text-main);
        display: flex;
        min-height: 100vh;
    }

    .sidebar {
        width: 260px;
        background: var(--bg-panel);
        border-right: 2px solid var(--border-panel);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .sidebar-header h1 {
        margin: 0;
        font-size: 20px;
        text-align: center;
    }

    .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
    }

    .btn {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--accent);
        background: #1b2945;
        color: var(--accent);
        cursor: pointer;
        font-size: 12px;
    }

    .search-box input {
        width: 100%;
        padding: 6px;
        border-radius: 999px;
        border: 1px solid #3b456b;
        background: #101528;
        color: var(--text-main);
    }

    .game-list {
        flex: 1;
        overflow-y: auto;
    }

    .game-card {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        margin-bottom: 8px;
        background: var(--bg-card);
        border-radius: 10px;
        cursor: grab;
        border: 1px solid #2c3558;
        transition: 0.15s;
    }

    .game-card.dragging {
        opacity: 0.6;
        transform: scale(0.97);
    }

    .game-thumb {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: #222;
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .game-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .game-title {
        font-size: 13px;
        font-weight: 500;
    }

    .tiers-wrapper {
        flex: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .tier-row {
        display: flex;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-panel);
        background: rgba(10, 14, 30, 0.9);
        min-height: 80px;
    }

    .tier-label {
        width: 72px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        font-weight: 800;
        font-size: 24px;
        color: #050814;
        text-align: center;
    }

    .tier-label.S { background: var(--tier-S); }
    .tier-label.A { background: var(--tier-A); }
    .tier-label.B { background: var(--tier-B); }
    .tier-label.C { background: var(--tier-C); }
    .tier-label.D { background: var(--tier-D); }
    .tier-label.F { background: var(--tier-F); }

    .tier-content {
        flex: 1;
        padding: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 60px;
    }

    .tier-content.drag-over {
        background: rgba(72,198,239,0.12);
        box-shadow: inset 0 0 0 1px var(--accent);
    }

    @media (max-width: 900px) {
        body { flex-direction: column; }
        .sidebar { width: 100%; max-height: 260px; border-right: none; border-bottom: 2px solid var(--border-panel); }
        .tier-row { flex-direction: column; }
        .tier-label { width: 100%; flex-direction: row; justify-content: center; }
    }
</style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header">
        <h1>Popular Games</h1>
        <div class="controls">
            <button class="btn" id="saveBtn">Save</button>
            <button class="btn" id="loadBtn">Load</button>
            <button class="btn" id="resetBtn">Reset</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search games…">
        </div>
    </div>
    <div class="game-list" id="gameList"></div>
</aside>

<main class="tiers-wrapper">
    <div class="tier-row">
        <div class="tier-label S">S</div>
        <div class="tier-content" data-rank="S"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label A">A</div>
        <div class="tier-content" data-rank="A"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label B">B</div>
        <div class="tier-content" data-rank="B"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label C">C</div>
        <div class="tier-content" data-rank="C"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label D">D</div>
        <div class="tier-content" data-rank="D"></div>
    </div>
    <div class="tier-row">
        <div class="tier-label F">F</div>
        <div class="tier-content" data-rank="F"></div>
    </div>
</main>

<script>
/* -----------------------------
   GAME LIST (50+ GAMES)
------------------------------*/
const GAME_DATA = [
    "Roblox","Minecraft","Grand Theft Auto V","Fortnite","Call of Duty: Warzone",
    "Apex Legends","Valorant","League of Legends","Dota 2","Counter-Strike 2",
    "Overwatch 2","Rocket League","PUBG","Among Us","Fall Guys",
    "Genshin Impact","Elden Ring","The Legend of Zelda: Breath of the Wild",
    "Red Dead Redemption 2","Cyberpunk 2077","Halo Infinite","Destiny 2",
    "Rainbow Six Siege","Battlefield 2042","FIFA 24","NBA 2K24","Madden NFL 24",
    "Animal Crossing: New Horizons","Super Smash Bros. Ultimate","Mario Kart 8 Deluxe",
    "Splatoon 3","Pokémon Scarlet/Violet","Monster Hunter: World","Monster Hunter Rise",
    "Sea of Thieves","Rust","ARK: Survival Evolved","Terraria","The Sims 4",
    "Starfield","No Man’s Sky","Hades","Stardew Valley","Dead by Daylight",
    "Phasmophobia","Warframe","World of Warcraft","Final Fantasy XIV",
    "Lost Ark","Diablo IV","Path of Exile","Brawl Stars","Clash Royale","Clash of Clans"
];

/* -----------------------------
   HIGH-RES WIKIPEDIA BOX ART ICONS (EXAMPLES)
   You can replace any URL with a better one if you want.
------------------------------*/
const GAME_ICONS = {
    "Minecraft": "https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png",
    "Grand Theft Auto V": "https://upload.wikimedia.org/wikipedia/en/a/a5/Grand_Theft_Auto_V.png",
    "Fortnite": "https://upload.wikimedia.org/wikipedia/en/thumb/0/09/Fortnite_cover_art.jpg/600px-Fortnite_cover_art.jpg",
    "Among Us": "https://upload.wikimedia.org/wikipedia/en/9/9a/Among_Us_cover_art.jpg",
    "Fall Guys": "https://upload.wikimedia.org/wikipedia/en/3/3b/Fall_Guys_cover_art.jpg",
    "Elden Ring": "https://upload.wikimedia.org/wikipedia/en/b/b9/Elden_Ring_Box_art.jpg",
    "The Legend of Zelda: Breath of the Wild": "https://upload.wikimedia.org/wikipedia/en/0/0b/The_Legend_of_Zelda_Breath_of_the_Wild.jpg",
    "Red Dead Redemption 2": "https://upload.wikimedia.org/wikipedia/en/4/44/Red_Dead_Redemption_II.jpg",
    "Cyberpunk 2077": "https://upload.wikimedia.org/wikipedia/en/9/9f/Cyberpunk_2077_box_art.jpg",
    "Halo Infinite": "https://upload.wikimedia.org/wikipedia/en/0/0c/Halo_Infinite.png",
    "Destiny 2": "https://upload.wikimedia.org/wikipedia/en/0/02/Destiny_2_%28artwork%29.jpg",
    "Rainbow Six Siege": "https://upload.wikimedia.org/wikipedia/en/4/4d/Tom_Clancy%27s_Rainbow_Six_Siege_cover_art.jpg",
    "Battlefield 2042": "https://upload.wikimedia.org/wikipedia/en/0/02/Battlefield_2042_cover_art.jpg",
    "Animal Crossing: New Horizons": "https://upload.wikimedia.org/wikipedia/en/2/2d/Animal_Crossing_New_Horizons.jpg",
    "Super Smash Bros. Ultimate": "https://upload.wikimedia.org/wikipedia/en/5/5c/Super_Smash_Bros._Ultimate.jpg",
    "Mario Kart 8 Deluxe": "https://upload.wikimedia.org/wikipedia/en/0/0d/Mario_Kart_8_Deluxe.jpg",
    "Splatoon 3": "https://upload.wikimedia.org/wikipedia/en/3/3c/Splatoon_3_cover_art.jpg",
    "Monster Hunter: World": "https://upload.wikimedia.org/wikipedia/en/2/2d/Monster_Hunter_World_cover_art.jpg",
    "Monster Hunter Rise": "https://upload.wikimedia.org/wikipedia/en/5/5c/Monster_Hunter_Rise_cover_art.jpg",
    "Sea of Thieves": "https://upload.wikimedia.org/wikipedia/en/4/4b/Sea_of_Thieves_cover_art.jpg",
    "Terraria": "https://upload.wikimedia.org/wikipedia/en/1/1d/Terraria_Cover_Art.png",
    "The Sims 4": "https://upload.wikimedia.org/wikipedia/en/5/5f/The_Sims_4_cover_art.jpg",
    "No Man’s Sky": "https://upload.wikimedia.org/wikipedia/en/3/32/No_Man%27s_Sky_cover_art.jpg",
    "Hades": "https://upload.wikimedia.org/wikipedia/en/0/0a/Hades_cover_art.png",
    "Stardew Valley": "https://upload.wikimedia.org/wikipedia/en/5/5c/Stardew_Valley_logo.png",
    "Dead by Daylight": "https://upload.wikimedia.org/wikipedia/en/5/5d/Dead_by_Daylight_Cover_Art.jpg",
    "Phasmophobia": "https://upload.wikimedia.org/wikipedia/en/4/4b/Phasmophobia_cover_art.jpg",
    "Warframe": "https://upload.wikimedia.org/wikipedia/en/2/2b/Warframe_Cover_Art.jpg",
    "World of Warcraft": "https://upload.wikimedia.org/wikipedia/en/0/0c/World_of_Warcraft_Cover_Art.jpg",
    "Final Fantasy XIV": "https://upload.wikimedia.org/wikipedia/en/0/0d/Final_Fantasy_XIV_Heavensward_box_art.jpg",
    "Diablo IV": "https://upload.wikimedia.org/wikipedia/en/5/5c/Diablo_IV_cover_art.png",
    "Path of Exile": "https://upload.wikimedia.org/wikipedia/en/0/0d/Path_of_Exile_logo.png"
    // You can add more entries here if you want.
};

const gameListEl = document.getElementById("gameList");
const tierEls = document.querySelectorAll(".tier-content");
const searchInput = document.getElementById("searchInput");

let draggedCard = null;
let ghostCard = null;
let offsetX = 0;
let offsetY = 0;

/* -----------------------------
   CREATE GAME CARD
------------------------------*/
function createGameCard(name) {
    const card = document.createElement("div");
    card.className = "game-card";
    card.draggable = true;
    card.dataset.game = name;

    const thumb = document.createElement("div");
    thumb.className = "game-thumb";

    const img = document.createElement("img");
    if (GAME_ICONS[name]) {
        img.src = GAME_ICONS[name];
        img.alt = name + " box art";
    } else {
        img.style.background = "linear-gradient(135deg,#48c6ef,#6f86d6)";
    }
    thumb.appendChild(img);

    const title = document.createElement("div");
    title.className = "game-title";
    title.textContent = name;

    card.appendChild(thumb);
    card.appendChild(title);

    addMouseDrag(card);
    addTouchDrag(card);

    return card;
}

/* -----------------------------
   MOUSE DRAG
------------------------------*/
function addMouseDrag(card) {
    card.addEventListener("dragstart", e => {
        draggedCard = card;
        card.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
    });

    card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        draggedCard = null;
    });
}

/* -----------------------------
   TOUCH DRAG (TierMaker style)
------------------------------*/
function addTouchDrag(card) {
    card.addEventListener("touchstart", e => {
        const touch = e.touches[0];
        draggedCard = card;

        offsetX = touch.clientX - card.getBoundingClientRect().left;
        offsetY = touch.clientY - card.getBoundingClientRect().top;

        ghostCard = card.cloneNode(true);
        ghostCard.style.position = "fixed";
        ghostCard.style.left = touch.clientX - offsetX + "px";
        ghostCard.style.top = touch.clientY - offsetY + "px";
        ghostCard.style.width = card.offsetWidth + "px";
        ghostCard.style.opacity = "0.8";
        ghostCard.style.pointerEvents = "none";
        ghostCard.style.zIndex = "9999";

        document.body.appendChild(ghostCard);
        card.classList.add("dragging");
    }, { passive: true });

    card.addEventListener("touchmove", e => {
        if (!ghostCard) return;
        const touch = e.touches[0];

        ghostCard.style.left = touch.clientX - offsetX + "px";
        ghostCard.style.top = touch.clientY - offsetY + "px";

        tierEls.forEach(t => t.classList.remove("drag-over"));
        const elem = document.elementFromPoint(touch.clientX, touch.clientY);
        if (elem) {
            const tier = elem.closest(".tier-content");
            if (tier) tier.classList.add("drag-over");
        }

        e.preventDefault();
    }, { passive: false });

    card.addEventListener("touchend", e => {
        if (!ghostCard) return;

        const touch = e.changedTouches[0];
        const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);

        tierEls.forEach(t => t.classList.remove("drag-over"));

        if (dropTarget) {
            const tier = dropTarget.closest(".tier-content");
            const list = dropTarget.closest(".game-list");
            if (tier) {
                tier.appendChild(draggedCard);
            } else if (list) {
                gameListEl.appendChild(draggedCard);
            }
        }

        ghostCard.remove();
        ghostCard = null;
        draggedCard.classList.remove("dragging");
        draggedCard = null;
    }, { passive: true });
}

/* -----------------------------
   MOUSE DROP TARGETS
------------------------------*/
tierEls.forEach(tier => {
    tier.addEventListener("dragover", e => e.preventDefault());
    tier.addEventListener("drop", e => {
        e.preventDefault();
        if (draggedCard) tier.appendChild(draggedCard);
    });
});

gameListEl.addEventListener("dragover", e => e.preventDefault());
gameListEl.addEventListener("drop", e => {
    e.preventDefault();
    if (draggedCard) gameListEl.appendChild(draggedCard);
});

/* -----------------------------
   RENDER GAME LIST
------------------------------*/
function renderGameList(filter = "") {
    gameListEl.innerHTML = "";
    const f = filter.toLowerCase();

    GAME_DATA.forEach(name => {
        // Skip games already placed in tiers
        let placed = false;
        tierEls.forEach(tier => {
            tier.querySelectorAll(".game-card").forEach(card => {
                if (card.dataset.game === name) placed = true;
            });
        });
        if (placed) return;

        if (!f || name.toLowerCase().includes(f)) {
            gameListEl.appendChild(createGameCard(name));
        }
    });
}

searchInput.addEventListener("input", () => {
    renderGameList(searchInput.value);
});

/* -----------------------------
   SAVE / LOAD / RESET
------------------------------*/
const STORAGE_KEY = "tierSave_wiki_boxart_v1";

document.getElementById("saveBtn").onclick = () => {
    const data = { list: [] };
    tierEls.forEach(tier => {
        const rank = tier.dataset.rank;
        data[rank] = [];
        tier.querySelectorAll(".game-card").forEach(card => {
            data[rank].push(card.dataset.game);
        });
    });
    gameListEl.querySelectorAll(".game-card").forEach(card => {
        data.list.push(card.dataset.game);
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
};

document.getElementById("loadBtn").onclick = () => {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);

    tierEls.forEach(t => t.innerHTML = "");
    gameListEl.innerHTML = "";

    GAME_DATA.forEach(name => {
        const card = createGameCard(name);
        if (data.list && data.list.includes(name)) {
            gameListEl.appendChild(card);
        } else {
            let placed = false;
            tierEls.forEach(tier => {
                const rank = tier.dataset.rank;
                if (data[rank] && data[rank].includes(name)) {
                    tier.appendChild(card);
                    placed = true;
                }
            });
            if (!placed && (!data.list || !data.list.includes(name))) {
                gameListEl.appendChild(card);
            }
        }
    });
};

document.getElementById("resetBtn").onclick = () => {
    localStorage.removeItem(STORAGE_KEY);
    tierEls.forEach(t => t.innerHTML = "");
    gameListEl.innerHTML = "";
    renderGameList();
};

/* -----------------------------
   INITIAL LOAD
------------------------------*/
renderGameList();
</script>

</body>
</html>
